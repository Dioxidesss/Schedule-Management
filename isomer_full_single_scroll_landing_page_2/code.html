<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Isomer - Auth</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style type="text/tailwindcss">
        :root {
            --primary: #00E5FF;
            --background-dark: #0a1128;
            --surface-dark: #1B2A47;
            --surface-darker: #152036;
        }
        @layer base {
            body {
                @apply bg-[#0a1128] font-['Noto_Sans'];
            }
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#00E5FF",
                        "background-dark": "#0a1128",
                        "surface-dark": "#1B2A47",
                        "surface-darker": "#152036",
                    },
                    fontFamily: {
                        display: ["Space Grotesk", "sans-serif"],
                        body: ["Noto Sans", "sans-serif"],
                    }
                },
            },
        }
    </script>
</head>
<body class="min-h-screen flex items-center justify-center p-6 selection:bg-primary/30">
<div class="w-full max-w-[440px] relative">
<div class="absolute -inset-1 bg-primary/20 rounded-2xl blur-xl"></div>
<div class="relative bg-surface-dark border border-white/10 rounded-2xl p-8 lg:p-10 shadow-2xl">
<div class="flex flex-col items-center mb-8">
<div class="h-14 w-14 mb-4">
<svg class="h-full w-full" fill="none" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<path d="M10 80 L50 50 L40 40 Z" fill="#0055AA"></path>
<path d="M10 80 L40 40 L50 15 Z" fill="#0077EE"></path>
<path d="M50 50 L90 20 L60 60 Z" fill="#0055AA"></path>
<path d="M90 20 L60 60 L50 85 Z" fill="#0077EE"></path>
<path d="M40 40 L60 60 L50 50 Z" fill="#00CCFF"></path>
<path d="M10 80 L50 50 L50 15 Z" fill="url(#grad1)" opacity="0.8"></path>
<path d="M90 20 L50 50 L50 85 Z" fill="url(#grad2)" opacity="0.8"></path>
<defs>
<linearGradient gradientUnits="userSpaceOnUse" id="grad1" x1="10" x2="50" y1="80" y2="15">
<stop stop-color="#00E5FF"></stop>
<stop offset="1" stop-color="#003366"></stop>
</linearGradient>
<linearGradient gradientUnits="userSpaceOnUse" id="grad2" x1="90" x2="50" y1="20" y2="85">
<stop stop-color="#00E5FF"></stop>
<stop offset="1" stop-color="#003366"></stop>
</linearGradient>
</defs>
</svg>
</div>
<h1 class="text-white text-3xl font-display font-black tracking-tighter uppercase">Isomer</h1>
<p class="text-slate-400 text-sm mt-2">Autonomous Dock Orchestration</p>
</div>
<button class="w-full flex items-center justify-center gap-3 bg-white hover:bg-slate-100 text-slate-900 font-bold py-3 px-4 rounded-lg transition-all duration-200 mb-6">
<svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Continue with Google
            </button>
<div class="relative mb-6">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-700"></div>
</div>
<div class="relative flex justify-center">
<span class="bg-surface-dark px-4 text-xs font-bold text-slate-500 uppercase tracking-widest">or</span>
</div>
</div>
<form class="space-y-4">
<div>
<label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5" for="email">Email Address</label>
<input class="w-full bg-surface-darker border border-slate-700 rounded-lg py-3 px-4 text-white focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-slate-600 outline-none" id="email" placeholder="name@company.com" type="email"/>
</div>
<div>
<label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5" for="password">Password</label>
<input class="w-full bg-surface-darker border border-slate-700 rounded-lg py-3 px-4 text-white focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-slate-600 outline-none" id="password" placeholder="••••••••" type="password"/>
</div>
<button class="w-full mt-6 bg-primary hover:bg-white text-background-dark font-display font-black text-sm uppercase tracking-wider py-4 rounded-lg transition-all shadow-[0_0_20px_rgba(0,229,255,0.3)] hover:shadow-[0_0_30px_rgba(0,229,255,0.5)]" type="submit">
                    Get Started Free
                </button>
</form>
<div class="mt-8 text-center space-y-4">
<p class="text-sm text-slate-400">
                    Already have an account? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Sign In</a>
</p>
<div class="flex items-center justify-center gap-4 pt-4 border-t border-slate-700/50">
<a class="text-[10px] text-slate-500 uppercase font-bold tracking-widest hover:text-slate-300" href="#">Privacy Policy</a>
<span class="h-1 w-1 rounded-full bg-slate-700"></span>
<a class="text-[10px] text-slate-500 uppercase font-bold tracking-widest hover:text-slate-300" href="#">Terms of Service</a>
</div>
</div>
</div>
<div class="absolute -top-12 -left-12 h-24 w-24 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute -bottom-12 -right-12 h-32 w-32 bg-primary/10 rounded-full blur-3xl"></div>
</div>
<div class="fixed inset-0 pointer-events-none opacity-10 overflow-hidden -z-10">
<div class="absolute top-20 left-10 w-64 h-2 bg-slate-700 rounded-full"></div>
<div class="absolute top-32 left-10 w-48 h-2 bg-slate-700 rounded-full"></div>
<div class="absolute bottom-20 right-10 w-80 h-40 border border-slate-700 rounded-xl"></div>
<div class="absolute top-1/4 right-20 w-32 h-32 border border-primary/20 rounded-full"></div>
</div>

</body></html>
