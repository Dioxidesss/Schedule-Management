<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Isomer - New Appointment</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00E5FF","background-light": "#f5f8f8",
                        "background-dark": "#0a1128","surface-dark": "#0f1c3f","surface-highlight": "#1c2b55","border-dark": "#233565"},
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                    boxShadow: {
                        "glow": "0 0 20px -5px rgba(0, 229, 255, 0.5)",
                        "modal": "0 25px 50px -12px rgba(0, 0, 0, 0.8)"
                    }
                },
            },
        }
    </script>
<style>::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a1128; 
        }
        ::-webkit-scrollbar-thumb {
            background: #233565; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #1c2b55; 
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased overflow-hidden h-screen w-screen relative text-slate-200">
<div class="absolute inset-0 z-0 opacity-40 blur-sm pointer-events-none select-none">
<div class="relative flex h-full w-full flex-col bg-background-dark overflow-hidden">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-border-dark px-10 py-4 bg-surface-dark">
<div class="flex items-center gap-8">
<div class="flex items-center gap-4 text-slate-100">
<div class="size-8 text-primary">
<svg class="w-full h-full" fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M24 45.8096C19.6865 45.8096 15.4698 44.5305 11.8832 42.134C8.29667 39.7376 5.50128 36.3314 3.85056 32.3462C2.19985 28.361 1.76794 23.9758 2.60947 19.7452C3.451 15.5145 5.52816 11.6284 8.57829 8.5783C11.6284 5.52817 15.5145 3.45101 19.7452 2.60948C23.9758 1.76795 28.361 2.19986 32.3462 3.85057C36.3314 5.50129 39.7376 8.29668 42.134 11.8833C44.5305 15.4698 45.8096 19.6865 45.8096 24L24 24L24 45.8096Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-slate-100 text-xl font-bold leading-tight tracking-tight">Isomer | Live Dock</h2>
</div>
</div>
<div class="flex flex-1 justify-end gap-8">
<div class="flex items-center gap-9">
<span class="text-slate-400 text-sm font-medium">Dashboard</span>
<span class="text-slate-400 text-sm font-medium">Schedule</span>
<span class="text-slate-400 text-sm font-medium">Reports</span>
</div>
<div class="bg-center bg-no-repeat bg-cover rounded-full size-10 bg-surface-highlight border border-border-dark" data-alt="User avatar placeholder"></div>
</div>
</header>
<div class="flex flex-1 p-10 gap-6">
<div class="w-1/4 h-64 bg-surface-dark rounded-xl border border-border-dark"></div>
<div class="w-1/4 h-64 bg-surface-dark rounded-xl border border-border-dark"></div>
<div class="w-2/4 h-64 bg-surface-dark rounded-xl border border-border-dark"></div>
</div>
</div>
</div>
<div class="absolute inset-0 z-10 flex items-center justify-center bg-[#05091a]/70 backdrop-blur-sm p-4">
<div class="w-full max-w-[520px] bg-surface-dark border border-border-dark rounded-2xl shadow-modal flex flex-col relative overflow-hidden">
<div class="flex items-center justify-between px-8 py-6 border-b border-border-dark bg-[#0a1128]/50">
<h1 class="text-2xl font-bold text-white tracking-tight">New Appointment</h1>
<button class="text-slate-400 hover:text-white transition-colors p-1 rounded-full hover:bg-white/10">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
</div>
<div class="p-8 flex flex-col gap-6">
<div class="flex flex-col gap-2">
<label class="text-slate-300 text-sm font-medium leading-none tracking-wide">PO Number</label>
<div class="relative group">
<input class="w-full h-12 rounded-lg bg-[#0a1128] border border-border-dark text-white placeholder:text-slate-500 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all duration-200 px-4 pl-11 text-base font-medium shadow-sm" placeholder="Enter PO Number (e.g. 844392)" type="text"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xl pointer-events-none group-focus-within:text-primary transition-colors">inventory_2</span>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-300 text-sm font-medium leading-none tracking-wide">Carrier Name</label>
<div class="relative group">
<select class="w-full h-12 rounded-lg bg-[#0a1128] border border-border-dark text-white focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all duration-200 px-4 pl-11 appearance-none cursor-pointer font-medium shadow-sm">
<option disabled="" selected="" value="">Select Carrier</option>
<option value="fedex">FedEx Freight</option>
<option value="dhl">DHL Supply Chain</option>
<option value="xpo">XPO Logistics</option>
<option value="ups">UPS Freight</option>
</select>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xl pointer-events-none group-focus-within:text-primary transition-colors">local_shipping</span>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none">expand_more</span>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-300 text-sm font-medium leading-none tracking-wide">Scheduled Time</label>
<div class="grid grid-cols-2 gap-4">
<div class="relative group">
<input class="w-full h-12 rounded-lg bg-[#0a1128] border border-border-dark text-white focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all duration-200 px-4 pl-11 [color-scheme:dark] font-medium shadow-sm" type="date"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xl pointer-events-none group-focus-within:text-primary transition-colors">calendar_today</span>
</div>
<div class="relative group">
<input class="w-full h-12 rounded-lg bg-[#0a1128] border border-border-dark text-white focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all duration-200 px-4 pl-11 [color-scheme:dark] font-medium shadow-sm" type="time"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xl pointer-events-none group-focus-within:text-primary transition-colors">schedule</span>
</div>
</div>
</div>
<div class="flex flex-col gap-3 pt-2">
<span class="text-slate-300 text-sm font-medium leading-none tracking-wide">Load Type</span>
<div class="flex w-full p-1 bg-[#0a1128] rounded-xl border border-border-dark relative">
<label class="flex-1 relative cursor-pointer group">
<input checked="" class="peer sr-only" name="load_type" type="radio" value="palletized"/>
<div class="flex items-center justify-center gap-2 py-2.5 rounded-lg transition-all duration-300 text-slate-400 peer-checked:bg-surface-highlight peer-checked:text-primary peer-checked:shadow-[0_0_15px_-5px_rgba(0,229,255,0.3)] peer-checked:border peer-checked:border-primary/30 font-semibold text-sm">
<span class="material-symbols-outlined text-[18px]">layers</span>
                            Palletized
                        </div>
</label>
<label class="flex-1 relative cursor-pointer group">
<input class="peer sr-only" name="load_type" type="radio" value="floor-loaded"/>
<div class="flex items-center justify-center gap-2 py-2.5 rounded-lg transition-all duration-300 text-slate-400 peer-checked:bg-surface-highlight peer-checked:text-primary peer-checked:shadow-[0_0_15px_-5px_rgba(0,229,255,0.3)] peer-checked:border peer-checked:border-primary/30 font-semibold text-sm">
<span class="material-symbols-outlined text-[18px]">grid_view</span>
                            Floor-loaded
                        </div>
</label>
</div>
</div>
</div>
<div class="p-6 pt-2 pb-8 flex items-center justify-end gap-3 bg-[#0a1128]/30 border-t border-border-dark/50">
<button class="px-6 py-3 rounded-lg text-slate-400 text-sm font-medium hover:text-white hover:bg-white/5 transition-all">
                Cancel
            </button>
<button class="px-8 py-3 rounded-lg bg-primary text-[#0a1128] text-sm font-bold shadow-glow hover:bg-[#60f0ff] hover:shadow-[0_0_30px_-5px_rgba(0,229,255,0.7)] transition-all flex items-center gap-2 transform active:scale-[0.98]">
<span class="material-symbols-outlined text-[20px]">add_circle</span>
                Create Appointment
            </button>
</div>
</div>
</div>

</body></html>
