<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Isomer Gatekeeper Kiosk View</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Noto+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#06f906","primary-dark": "#05cc05",
                        "accent": "#00ffff","background-light": "#f5f8f5",
                        "background-dark": "#0a1128","surface-dark": "#131f3e",
                        "surface-light": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Noto Sans", "sans-serif"],
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0a1128; 
        }
        ::-webkit-scrollbar-thumb {
            background: #1c2e52; 
            border-radius: 3px;
        }
        .glass-panel {
            background: rgba(19, 31, 62, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(6, 249, 6, 0.15);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(6, 249, 6, 0.3);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex items-center justify-center p-4">
<main class="w-full max-w-md h-[850px] max-h-screen glass-panel rounded-2xl flex flex-col relative overflow-hidden shadow-2xl">
<header class="flex items-center justify-between px-6 py-5 border-b border-primary/20 bg-surface-dark/50">
<div class="flex items-center gap-3">
<div class="size-8 text-primary flex items-center justify-center bg-primary/10 rounded-lg">
<span class="material-symbols-outlined text-2xl" style="">local_shipping</span>
</div>
<div>
<h2 class="text-white text-lg font-bold leading-none tracking-tight" style="">ISOMER</h2>
<span class="text-accent text-xs font-medium tracking-widest uppercase" style="">Gatekeeper</span>
</div>
</div>
<button class="flex items-center justify-center size-10 rounded-lg hover:bg-white/5 transition-colors text-slate-300" style="">
<span class="material-symbols-outlined" style="">settings</span>
</button>
</header>
<div class="flex-1 overflow-y-auto px-6 py-8 flex flex-col gap-8">
<div class="text-center">
<h1 class="text-3xl font-bold text-white mb-2" style="">Truck Arrival</h1>
<p class="text-slate-400 text-sm" style="">Scan documents or enter details manually</p>
</div>
<div class="w-full">
<label class="block text-accent text-xs font-bold uppercase tracking-wider mb-2 ml-1" style="">Identify Vehicle</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-primary">
<span class="material-symbols-outlined text-2xl" style="">search</span>
</div>
<input class="block w-full rounded-xl border-2 border-primary/30 bg-surface-dark py-4 pl-12 pr-12 text-white placeholder:text-slate-500 focus:border-primary focus:ring-0 focus:outline-none text-lg font-medium transition-all shadow-[0_0_20px_rgba(6,249,6,0.05)] focus:shadow-[0_0_20px_rgba(6,249,6,0.15)]" placeholder="Enter PO Number or License Plate" type="text">
<div class="absolute inset-y-0 right-0 pr-3 flex items-center">
<button class="p-2 text-slate-400 hover:text-white transition-colors" style="">
<span class="material-symbols-outlined" style="">qr_code_scanner</span>
</button>
</div>
</div>
</div>
<div class="bg-surface-dark rounded-xl border border-white/10 overflow-hidden shadow-lg relative">
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary via-accent to-primary opacity-50"></div>
<div class="absolute top-1 right-4 w-px h-8 bg-white/10"></div>
<div class="p-5 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-accent text-sm" style="">verified</span>
<span class="text-xs font-bold text-accent uppercase tracking-widest" style="">Match Found</span>
</div>
<div class="px-2 py-0.5 rounded bg-primary/20 border border-primary/30 text-primary text-xs font-bold" style="">
                        ON TIME
                    </div>
</div>
<div class="p-5 grid gap-6 relative">
<div class="absolute inset-0 opacity-[0.03]" style="background-image: radial-gradient(#fff 1px, transparent 1px); background-size: 10px 10px;"></div>
<div class="relative z-10">
<p class="text-slate-400 text-xs uppercase font-bold tracking-wider mb-1" style="">Vendor</p>
<p class="text-white text-xl font-medium font-body flex items-center gap-2" style="">
                            Samsung Logistics
                            <span class="material-symbols-outlined text-base text-slate-500" style="">domain</span>
</p>
</div>
<div class="grid grid-cols-2 gap-4 relative z-10">
<div class="bg-background-dark/50 p-3 rounded-lg border border-white/5">
<p class="text-slate-400 text-xs uppercase font-bold tracking-wider mb-1" style="">Scheduled Time</p>
<p class="text-white text-2xl font-bold tracking-tight" style="">14:00</p>
</div>
<div class="bg-background-dark/50 p-3 rounded-lg border border-white/5">
<p class="text-slate-400 text-xs uppercase font-bold tracking-wider mb-1" style="">Assigned Dock</p>
<p class="text-white text-2xl font-bold tracking-tight" style="">North</p>
</div>
</div>
<div class="relative z-10 pt-2 border-t border-dashed border-white/10">
<p class="text-slate-400 text-xs uppercase font-bold tracking-wider mb-2" style=""><br></p>
<div class="flex items-center justify-between">
<p class="text-primary text-3xl font-bold" style=""><br></p>
<div class="flex gap-1">
<div class="w-2 h-2 rounded-full bg-slate-700"></div>
<div class="w-2 h-2 rounded-full bg-slate-700"></div>
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<div class="w-2 h-2 rounded-full bg-slate-700"></div>
</div>
</div>
</div>
</div>
</div>
<div class="h-24"></div>
</div>
<footer class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-background-dark via-background-dark to-transparent backdrop-blur-sm">
<button class="w-full h-16 bg-primary hover:bg-primary-dark text-background-dark text-lg font-bold tracking-wider uppercase rounded-xl shadow-[0_0_20px_rgba(6,249,6,0.4)] transition-all transform active:scale-[0.98] flex items-center justify-center gap-3 group neon-glow" style="">
<span class="material-symbols-outlined text-2xl group-hover:translate-x-1 transition-transform" style="">login</span>
                Check-In Truck
            </button>
</footer>
</main>
<div class="fixed inset-0 -z-10 bg-[#050a18]">
<div class="absolute inset-0 bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-20 brightness-100 contrast-150"></div>
<div class="absolute top-0 left-0 w-full h-full overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[100px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-accent/5 blur-[100px]"></div>
</div>
</div>
</body></html>
