<!DOCTYPE html>

<link href="https://fonts.googleapis.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700;900&amp;display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>

            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#00e5ff",
                        "primary-dark": "#00acc1",
                        "background-dark": "#0a1128", 
                        "surface-dark": "#1B2A47",

                    fontFamily: {
                        display: ["Space Grotesk", "sans-serif"],
                        body: ["Noto Sans", "sans-serif"],

                        'tech-grid': 'linear-gradient(rgba(0, 229, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 229, 255, 0.05) 1px, transparent 1px)',

                },
            },
        }
    </script>
<style>
        .glow-border {
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }
        .glow-border:focus {
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.6);
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>

<div class="relative z-10 flex flex-col items-center w-full max-w-4xl px-4">

<stop stop-color="#00E5FF"></stop>

<div class="flex items-center gap-3 mt-8 bg-surface-dark px-4 py-2 rounded-full border border-slate-700/50">
<span class="relative flex h-3 w-3">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-3 w-3 bg-primary"></span>
</span>

<div class="absolute bottom-8 left-8 text-xs font-mono text-slate-600">
